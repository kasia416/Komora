<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Комора — кухонний журнал</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* ---- pantry token system ---- */
    --bg:#F2EFE7;
    --bg-deep:#E9E4D6;
    --surface:#FFFFFF;
    --surface-soft:#FBF9F3;
    --ink:#1C1F1A;
    --ink-soft:#6E6858;
    --ink-faint:#A39D89;
    --line:#E3DECB;
    --line-strong:#D3CCB4;

    --pantry:#2B5A4C;        /* jar green */
    --pantry-deep:#183B31;
    --pantry-soft:#E3EDE6;

    --gold:#E0A03B;          /* shelf-label gold */
    --gold-deep:#B87D22;
    --gold-soft:#FBEDD3;

    --berry:#A6472F;         /* jar-lid stamp red */
    --berry-deep:#832F1C;
    --berry-soft:#F4E0D6;

    --sky:#3D6E86;
    --sky-deep:#2A4F62;
    --sky-soft:#E1EBEF;

    --radius-xl:26px;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:10px;
    --shadow-soft:0 1px 2px rgba(24,59,49,0.05), 0 14px 32px -16px rgba(24,59,49,0.18);
    --shadow-pop:0 24px 60px -20px rgba(24,59,49,0.34);

    --font-display:'Fraunces',Georgia,serif;
    --font-body:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-mono:'IBM Plex Mono',ui-monospace,'SF Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 10% -6%, rgba(43,90,76,0.07), transparent 46%),
      radial-gradient(circle at 92% 4%, rgba(224,160,59,0.08), transparent 40%),
      var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:1020px;margin:0 auto;padding-bottom:72px;}

  /* ---------------- HEADER ---------------- */
  header.top{
    background:
      radial-gradient(circle at 88% -20%, rgba(224,160,59,0.24), transparent 55%),
      linear-gradient(160deg,var(--pantry) 0%, var(--pantry-deep) 100%);
    color:var(--bg);
    padding:24px 26px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    border-radius:0 0 30px 30px;
    box-shadow:var(--shadow-pop);
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:'';
    position:absolute; inset:0;
    background-image:radial-gradient(circle, rgba(245,243,237,0.06) 1.4px, transparent 1.6px);
    background-size:18px 18px;
    pointer-events:none;
  }
  .shelf-line{
    position:absolute; left:0; right:0; bottom:0; height:1px;
    background:repeating-linear-gradient(90deg, rgba(224,160,59,0.55) 0 6px, transparent 6px 14px);
    opacity:0.5;
  }
  .brand{display:flex;align-items:center;gap:13px;position:relative;z-index:1;}
  .brand-mark{
    width:44px;height:44px;border-radius:13px;
    background:var(--gold);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.18), 0 6px 16px -4px rgba(0,0,0,0.35);
  }
  .brand-mark svg{width:25px;height:25px;}
  .brand-text h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:1.62rem;
    letter-spacing:0.01em;
    margin:0;
    line-height:1.05;
  }
  .brand-text p{
    font-family:var(--font-mono);
    text-transform:uppercase;
    letter-spacing:0.13em;
    font-size:0.62rem;
    color:rgba(245,243,237,0.6);
    margin:4px 0 0;
  }
  .header-right{display:flex;align-items:center;gap:10px;position:relative;z-index:1;}

  /* jar-lid calorie stamp (signature element) */
  .lid-btn{
    background:rgba(245,243,237,0.08);
    border:1px solid rgba(245,243,237,0.18);
    border-radius:999px;
    padding:5px 14px 5px 5px;
    display:flex;align-items:center;gap:10px;
    color:var(--bg);
    transition:background .15s ease, transform .1s ease;
  }
  .lid-btn:hover{background:rgba(245,243,237,0.15);}
  .lid-btn:active{transform:scale(0.97);}
  .lid{width:36px;height:36px;flex-shrink:0;position:relative;}
  .lid-label{text-align:left;line-height:1.16;}
  .lid-label .kcal-val{font-family:var(--font-mono);font-weight:700;font-size:0.84rem;display:block;letter-spacing:0.01em;}
  .lid-label .kcal-sub{font-family:var(--font-mono);font-size:0.58rem;text-transform:uppercase;letter-spacing:0.09em;color:rgba(245,243,237,0.55);}

  /* ---------------- NAV ---------------- */
  nav.tabs{
    display:flex;
    gap:4px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:999px;
    padding:5px;
    margin:18px 20px 0;
    overflow-x:auto;
    box-shadow:var(--shadow-soft);
  }
  nav.tabs button{
    flex:1;
    min-width:98px;
    background:transparent;
    border:none;
    border-radius:999px;
    padding:10px 8px;
    font-family:var(--font-body);
    font-weight:700;
    font-size:0.78rem;
    color:var(--ink-soft);
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    transition:background .15s ease,color .15s ease;
    white-space:nowrap;
  }
  nav.tabs button .ic{font-size:1.08rem;}
  nav.tabs button.active{
    background:var(--pantry);
    color:var(--bg);
    box-shadow:0 8px 18px -8px rgba(24,59,49,0.55);
  }
  nav.tabs button:not(.active):hover{color:var(--ink);background:var(--surface-soft);}

  main{padding:20px 20px 0;}

  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-xl);
    margin-bottom:18px;
    box-shadow:var(--shadow-soft);
    overflow:hidden;
  }
  .card-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:18px 22px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .card-head h2{
    font-family:var(--font-display);
    font-weight:600;
    font-size:1.24rem;
    margin:0;
    color:var(--pantry-deep);
  }
  .card-head .hint{font-size:0.78rem;color:var(--ink-soft);margin:2px 0 0;}
  .card-body{padding:20px 22px 22px;}

  /* ---------------- buttons ---------------- */
  button{font-family:var(--font-body);cursor:pointer;}
  .btn{
    background:var(--pantry);
    color:var(--bg);
    border:none;
    padding:10px 17px;
    border-radius:999px;
    font-size:0.8rem;
    font-weight:700;
    letter-spacing:0.01em;
    transition:transform .1s ease, background .15s ease;
  }
  .btn:hover{background:var(--pantry-deep);}
  .btn:active{transform:scale(0.97);}
  .btn.gold{background:var(--gold);color:var(--pantry-deep);}
  .btn.gold:hover{background:var(--gold-deep);color:#fff;}
  .btn.berry{background:var(--berry);color:#fff;}
  .btn.berry:hover{background:var(--berry-deep);}
  .btn.ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink-soft);}
  .btn.ghost:hover{border-color:var(--pantry);color:var(--pantry-deep);background:var(--pantry-soft);}
  .btn.small{padding:6px 12px;font-size:0.72rem;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

  input,select,textarea{
    font-family:var(--font-body);
    border:1px solid var(--line-strong);
    background:var(--surface-soft);
    color:var(--ink);
    border-radius:var(--radius-sm);
    padding:10px 12px;
    font-size:0.85rem;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px;background:#fff;}
  .qty{font-family:var(--font-mono);}

  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .grid-add{
    display:grid;
    grid-template-columns:2fr 1fr 1fr auto;
    gap:8px;
    margin-bottom:14px;
  }
  .chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{
    border:1px solid var(--line-strong);
    background:var(--surface-soft);
    color:var(--ink-soft);
    padding:6px 13px;
    border-radius:999px;
    font-size:0.74rem;
    font-weight:700;
  }
  .chip.active{background:var(--pantry-soft);border-color:var(--pantry);color:var(--pantry-deep);}

  @media (max-width:640px){
    .grid-add{grid-template-columns:1fr 1fr;}
    header.top{padding:20px 16px 18px;border-radius:0 0 22px 22px;}
    .brand-text h1{font-size:1.32rem;}
    .lid-label{display:none;}
    .lid-btn{padding:5px;}
    main{padding:16px 14px 0;}
    nav.tabs{margin:14px 14px 0;}
  }

  .item-list{list-style:none;margin:0;padding:0;}
  .item-list li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:12px 2px;
    border-bottom:1px solid var(--line);
  }
  .item-list li:last-child{border-bottom:none;}
  .item-name{font-weight:700;flex:1;min-width:0;font-size:0.92rem;}
  .item-name small{display:block;font-weight:500;color:var(--ink-soft);font-family:var(--font-mono);font-size:0.72rem;margin-top:1px;}
  .badge{
    font-family:var(--font-mono);
    font-size:0.64rem;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:999px;
    letter-spacing:0.05em;
    white-space:nowrap;
    font-weight:700;
  }
  .badge.full{background:var(--pantry-soft);color:var(--pantry-deep);}
  .badge.partial{background:var(--gold-soft);color:var(--gold-deep);}
  .badge.auto{background:var(--sky-soft);color:var(--sky-deep);}

  /* jar-lid kcal stamp used inline in lists / cards */
  .kcal-stamp{
    display:inline-flex;align-items:center;gap:5px;
    font-family:var(--font-mono);font-size:0.66rem;font-weight:700;
    color:var(--berry-deep);background:var(--berry-soft);
    border:1px solid rgba(166,71,47,0.25);
    padding:4px 10px 4px 6px;border-radius:999px;letter-spacing:0.02em;
    white-space:nowrap;
  }
  .kcal-stamp .dot{width:7px;height:7px;border-radius:50%;background:var(--berry);flex-shrink:0;}
  .kcal-stamp.est{color:var(--sky-deep);background:var(--sky-soft);border-color:rgba(61,110,134,0.25);}
  .kcal-stamp.est .dot{background:var(--sky);}

  .empty{
    color:var(--ink-soft);
    font-style:italic;
    padding:28px 4px;
    text-align:center;
    font-size:0.88rem;
  }
  .stepper{display:flex;align-items:center;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden;}
  .stepper button{background:var(--surface-soft);border:none;width:27px;height:27px;font-size:0.9rem;color:var(--pantry-deep);font-weight:700;}
  .stepper button:hover{background:var(--pantry-soft);}

  /* recipe card */
  .recipe-card{border-bottom:1px solid var(--line);padding:17px 2px;}
  .recipe-card:last-child{border-bottom:none;}
  .recipe-title-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .recipe-title-row h3{margin:0;font-family:var(--font-display);font-weight:600;font-size:1.1rem;color:var(--ink);}
  .recipe-meta{font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-soft);display:flex;gap:10px;flex-wrap:wrap;margin-top:5px;align-items:center;}
  .recipe-missing{font-size:0.78rem;color:var(--berry);margin:7px 0 0;}
  .recipe-actions{margin-top:11px;display:flex;gap:8px;flex-wrap:wrap;}
  .ing-form-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;margin-bottom:6px;}
  .badge-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

  .kcal-estimate-box{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    background:var(--sky-soft);border:1px dashed rgba(61,110,134,0.4);
    border-radius:var(--radius-sm);padding:9px 12px;margin-top:8px;font-size:0.78rem;color:var(--sky-deep);
  }
  .kcal-estimate-box strong{font-family:var(--font-mono);}

  .planner{overflow-x:auto;}
  table.plan{border-collapse:collapse;width:100%;min-width:760px;}
  table.plan th,table.plan td{border:1px solid var(--line);padding:9px;text-align:left;vertical-align:top;}
  table.plan th{background:var(--surface-soft);font-family:var(--font-display);color:var(--pantry-deep);font-weight:600;font-size:0.85rem;}
  table.plan th .day-kcal{display:block;font-family:var(--font-mono);font-size:0.62rem;color:var(--ink-soft);font-weight:400;text-transform:none;margin-top:2px;}
  table.plan td.meal-label{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;color:var(--ink-soft);background:var(--surface-soft);white-space:nowrap;}
  table.plan select{width:100%;font-size:0.78rem;padding:7px 8px;}
  table.plan .cell-kcal{font-family:var(--font-mono);font-size:0.62rem;color:var(--berry-deep);margin-top:4px;display:block;}
  table.plan tr.total-row td{background:var(--pantry-soft);font-family:var(--font-mono);font-weight:700;color:var(--pantry-deep);font-size:0.72rem;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(24,59,49,0.48);
    backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;
  }
  .modal{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-xl);
    max-width:520px;width:100%;max-height:88vh;overflow-y:auto;
    box-shadow:var(--shadow-pop);
  }
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .modal-head h2{margin:0;font-family:var(--font-display);color:var(--pantry-deep);font-size:1.18rem;font-weight:600;}
  .modal-body{padding:22px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:0.72rem;font-weight:700;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--font-mono);}
  .field input,.field select,.field textarea{width:100%;}
  .field textarea{min-height:90px;resize:vertical;}
  .close-x{background:var(--surface-soft);border:1px solid var(--line-strong);border-radius:999px;width:30px;height:30px;font-size:1rem;color:var(--ink-soft);line-height:1;}
  .close-x:hover{color:var(--berry);}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--pantry-deep);color:var(--bg);padding:11px 19px;border-radius:999px;
    font-size:0.82rem;z-index:100;opacity:0;transition:opacity .2s ease, transform .2s ease;pointer-events:none;
    box-shadow:var(--shadow-pop);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  .loading-screen{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:50vh;color:var(--pantry);font-family:var(--font-display);font-size:1.1rem;gap:10px;
  }
  .checkbox-row{display:flex;align-items:center;gap:9px;}
  .checkbox-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--pantry);}
  .section-label{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-faint);margin:20px 0 7px;}
  .section-label:first-child{margin-top:0;}
  .sync-badge{
    font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.06em;
    color:rgba(245,243,237,0.55);margin-top:3px;display:block;
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 10L12 4L20 10V19C20 19.55 19.55 20 19 20H5C4.45 20 4 19.55 4 19V10Z" stroke="#183B31" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M9 20V14H15V20" stroke="#183B31" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Комора</h1>
        <p>холодильник · покупки · раціон · рецепти</p>
        <span class="sync-badge" id="sync-badge">офлайн</span>
      </div>
    </div>
    <div class="header-right">
      <button class="lid-btn" id="gauge-btn" title="Калорії на сьогодні">
        <svg class="lid" id="gauge-svg" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="15.5" fill="none" stroke="rgba(245,243,237,0.18)" stroke-width="3"></circle>
          <circle id="gauge-fg" cx="18" cy="18" r="15.5" fill="none" stroke="#E0A03B" stroke-width="3" stroke-linecap="round" stroke-dasharray="0 1000" transform="rotate(-90 18 18)"></circle>
        </svg>
        <span class="lid-label">
          <span class="kcal-val" id="gauge-val">0 / 0</span>
          <span class="kcal-sub">ккал сьогодні</span>
        </span>
      </button>
    </div>
    <div class="shelf-line"></div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="main">
    <div class="loading-screen">Відчиняємо комору…</div>
  </main>
</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ---------------- STATE ---------------- */
const state = {
  fridge: [],
  shopping: [],
  recipes: [],
  mealplan: [],
  calorieGoal: 2000,
  activeTab: 'fridge',
  loaded: false
};

const DAYS = ['Понеділок','Вівторок','Середа','Четвер',"П'ятниця",'Субота','Неділя'];
const MEALS = [{key:'breakfast',label:'Сніданок'},{key:'lunch',label:'Обід'},{key:'dinner',label:'Вечеря'}];
const UNITS = ['г','кг','мл','л','шт','ст.л.','ч.л.','пучок'];
const CATEGORIES = ["Овочі й фрукти","М'ясо й риба","Молочне","Бакалія","Заморозка","Інше"];

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayDayIndex(){
  const js = new Date().getDay();
  return js===0 ? 6 : js-1;
}

/* ================= SUPABASE SYNC (спільна комора на 2 телефонах) ================= */
// !!! ВСТАВ СЮДИ свій Project URL та anon public key з Supabase (Project Settings -> API) !!!
const SUPABASE_URL = "https://nybtyxuzfuemkwmffftk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_FT_MJKIs_VsKTf35G_u3zA_zsy9V81A";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function getHouseholdId(){
  let id = localStorage.getItem('komora_household_id');
  if(!id){
    id = prompt('Введи спільний код комори (однаковий на обох телефонах), напр. "nashakukhnia":');
    if(!id || !id.trim()) id = 'default-komora';
    id = id.trim().toLowerCase().replace(/[^a-z0-9_-]/g,'-');
    localStorage.setItem('komora_household_id', id);
  }
  return id;
}
const HOUSEHOLD_ID = getHouseholdId();

function setSyncBadge(text){
  const el = document.getElementById('sync-badge');
  if(el) el.textContent = text;
}

async function saveRow(patch){
  const row = {id: HOUSEHOLD_ID, updated_at: new Date().toISOString(), ...patch};
  const {error} = await sb.from('komora').upsert(row);
  if(error){ showToast('Немає інтернету — синхронізується пізніше'); }
}

async function loadAll(){
  let data = {};
  try{
    const {data: rows, error} = await sb.from('komora').select('*').eq('id', HOUSEHOLD_ID).maybeSingle();
    if(!error && rows) data = rows;
  }catch(e){ /* немає інтернету при першому запуску */ }

  state.fridge = data.fridge || [];
  state.shopping = data.shopping || [];
  state.recipes = data.recipes || [];
  state.mealplan = data.mealplan || DAYS.map(d=>({day:d,breakfast:null,lunch:null,dinner:null}));
  state.calorieGoal = data.calorie_goal || 2000;

  if(!data.seeded){
    state.recipes = state.recipes.concat(DEFAULT_RECIPES.map(r=>({...r, id: uid()})));
    try{ await saveRow({seeded:true, recipes: state.recipes}); }catch(e){}
  }
  state.loaded = true;
  setSyncBadge('синхронізовано · код: '+HOUSEHOLD_ID);

  // живий синк: щойно другий телефон щось змінить — цей телефон оновиться сам
  sb.channel('komora-'+HOUSEHOLD_ID)
    .on('postgres_changes', {event:'*', schema:'public', table:'komora', filter:'id=eq.'+HOUSEHOLD_ID}, payload=>{
      const d = payload.new;
      if(!d) return;
      state.fridge = d.fridge || [];
      state.shopping = d.shopping || [];
      state.recipes = d.recipes || [];
      state.mealplan = d.mealplan || state.mealplan;
      state.calorieGoal = d.calorie_goal || state.calorieGoal;
      renderTabs();
      renderMain();
    })
    .subscribe(status=>{
      if(status==='SUBSCRIBED') setSyncBadge('синхронізовано · код: '+HOUSEHOLD_ID);
      else if(status==='CHANNEL_ERROR' || status==='TIMED_OUT') setSyncBadge('офлайн · немає інтернету');
    });
}

/* ---------------- HELPERS: ingredients / fridge matching ---------------- */
function norm(s){ return (s||'').trim().toLowerCase(); }

function findFridgeItem(name){
  return state.fridge.find(f=>norm(f.name)===norm(name));
}
function ingredientAvailable(ing){
  const item = findFridgeItem(ing.name);
  if(!item) return false;
  if(item.unit===ing.unit) return item.qty >= ing.qty;
  return item.qty > 0;
}
function missingIngredients(recipe){
  return recipe.ingredients.filter(ing=>!ingredientAvailable(ing));
}
function addMissingToShopping(missing){
  missing.forEach(ing=>{
    const item = findFridgeItem(ing.name);
    let neededQty = ing.qty;
    if(item && item.unit===ing.unit){
      neededQty = Math.max(ing.qty - item.qty, 0);
    }
    if(neededQty<=0) return;
    let existing = state.shopping.find(s=>!s.checked && norm(s.name)===norm(ing.name) && s.unit===ing.unit);
    if(existing){
      existing.qty = Math.round((existing.qty + neededQty)*100)/100;
    }else{
      state.shopping.push({id:uid(), name:ing.name, qty:neededQty, unit:ing.unit, checked:false, auto:true});
    }
  });
}

const UNIT_GRAMS = {'г':1,'мл':1,'кг':1000,'л':1000,'ст.л.':15,'ч.л.':5,'пучок':30};

function matchKcalEntry(name){
  const n = norm(name);
  if(!n) return null;
  let best = null;
  for(const entry of KCAL_DB){
    if(n.includes(entry.k)){
      if(!best || entry.k.length > best.k.length) best = entry;
    }
  }
  return best;
}
function ingredientGrams(ing, entry){
  if(ing.unit==='шт') return entry && entry.piece ? entry.piece : 100;
  return (UNIT_GRAMS[ing.unit] || 1) * ing.qty;
}
/* Returns {kcal, matched, total} for a list of ingredients */
function estimateIngredientsKcal(ingredients){
  let kcal = 0, matched = 0;
  const list = ingredients.filter(i=>i.name && i.name.trim());
  list.forEach(ing=>{
    const entry = matchKcalEntry(ing.name);
    if(!entry) return;
    matched++;
    const grams = ing.unit==='шт' ? (entry.piece||100)*ing.qty : (UNIT_GRAMS[ing.unit]||1)*ing.qty;
    kcal += entry.kcal100 * (grams/100);
  });
  return {kcal: Math.round(kcal), matched, total: list.length};
}
/* Auto per-serving estimate for a whole recipe object */
function estimateRecipeKcalPerServing(recipe){
  const {kcal, matched, total} = estimateIngredientsKcal(recipe.ingredients||[]);
  const servings = Math.max(1, parseFloat(recipe.servings)||1);
  return {perServing: Math.round(kcal/servings), matched, total};
}
/* What we actually show/use: manual value if set, else automatic estimate */
function getRecipeCalories(recipe){
  if(recipe.calories && Number(recipe.calories)>0){
    return {value:Math.round(Number(recipe.calories)), estimated:false};
  }
  const est = estimateRecipeKcalPerServing(recipe);
  if(est.matched>0){
    return {value:est.perServing, estimated:true};
  }
  return {value:null, estimated:false};
}
function kcalStampHtml(recipe, opts){
  opts = opts||{};
  const c = getRecipeCalories(recipe);
  if(c.value==null) return '';
  const cls = c.estimated ? 'kcal-stamp est' : 'kcal-stamp';
  const suffix = opts.perServing===false ? ' ккал' : ' ккал/порц.';
  return `<span class="${cls}"><span class="dot"></span>${c.estimated?'≈ ':''}${c.value}${suffix}</span>`;
}

/* ---------------- CALORIE HELPERS (daily gauge) ---------------- */
function recipeById(id){ return state.recipes.find(r=>r.id===id); }
function dayKcal(dayObj){
  let total = 0;
  MEALS.forEach(m=>{
    const rid = dayObj[m.key];
    if(rid){
      const r = recipeById(rid);
      if(r){
        const c = getRecipeCalories(r);
        if(c.value!=null) total += c.value;
      }
    }
  });
  return total;
}
function updateGauge(){
  const idx = todayDayIndex();
  const day = state.mealplan[idx];
  const total = day ? dayKcal(day) : 0;
  const goal = state.calorieGoal || 2000;
  const pct = Math.max(0, Math.min(1, total/goal));
  const circumference = 2*Math.PI*15.5;
  const fg = document.getElementById('gauge-fg');
  if(fg){
    fg.setAttribute('stroke-dasharray', `${circumference*pct} ${circumference}`);
    fg.setAttribute('stroke', total>goal ? '#A6472F' : '#E0A03B');
  }
  const val = document.getElementById('gauge-val');
  if(val) val.textContent = `${total} / ${goal}`;
}

    grouped[item.category].push(item);

  let body = '';

    body += `<div class="section-label">${cat}</div>`;

    </div>`).join('') : `<div class="empty">Рецептів ще немає.</div>`;

  return `
  <div class="card">
    <div class="card-head">
      <h2>Рецепти <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-soft);font-weight:400;">(${state.recipes.length})</span></h2>
      <button class="btn gold small" data-act="recipe-new">+ Новий рецепт</button>
    </div>
    <div class="card-body">${list}</div>
  </div>`;
}

function openRecipeForm(existing){
  const isEdit = !!existing;
  const rec = existing ? JSON.parse(JSON.stringify(existing)) : {id:uid(), name:'', time:'', servings:'', calories:'', ingredients:[{name:'',qty:1,unit:'г'}], instructions:''};

  function ingredientsRowsHtml(){
    return rec.ingredients.map((ing,idx)=>`
      <div class="ing-form-row" data-idx="${idx}">
        <input class="ming-name" placeholder="Інгредієнт" value="${escapeHtml(ing.name)}">
        <input class="ming-qty qty" type="number" step="0.1" min="0" value="${ing.qty}">
        <select class="ming-unit">${UNITS.map(u=>`<option ${u===ing.unit?'selected':''}>${u}</option>`).join('')}</select>
        <button type="button" class="btn ghost small" data-act="ming-del" data-idx="${idx}">✕</button>
      </div>`).join('');
  }

  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-head">
          <h2>${isEdit?'Редагувати рецепт':'Новий рецепт'}</h2>
          <button class="close-x" id="modal-close">✕</button>
        </div>
        <div class="modal-body">
          <div class="field"><label>Назва страви</label><input id="rf-name" value="${escapeHtml(rec.name)}"></div>
          <div class="row">
            <div class="field" style="flex:1;"><label>Час, хв</label><input id="rf-time" type="number" min="0" value="${rec.time}"></div>
            <div class="field" style="flex:1;"><label>Порцій</label><input id="rf-servings" type="number" min="1" value="${rec.servings||1}"></div>
            <div class="field" style="flex:1;"><label>Ккал / порція</label><input id="rf-calories" type="number" min="0" value="${rec.calories}" placeholder="авто"></div>
          </div>
          <div class="field">
            <label>Інгредієнти</label>
            <div id="rf-ings">${ingredientsRowsHtml()}</div>
            <button type="button" class="btn ghost small" id="rf-add-ing">+ Інгредієнт</button>
            <div class="kcal-estimate-box" id="rf-kcal-box"></div>
          </div>
          <div class="field"><label>Приготування</label><textarea id="rf-instructions">${escapeHtml(rec.instructions)}</textarea></div>
          <div class="row" style="justify-content:flex-end;">
            <button class="btn ghost" id="rf-cancel">Скасувати</button>
            <button class="btn gold" id="rf-save">Зберегти рецепт</button>
          </div>
        </div>
      </div>
    </div>`;

  function syncRowsFromDom(){
    const rows = root.querySelectorAll('.ing-form-row');
    rec.ingredients = Array.from(rows).map(row=>({
      name: row.querySelector('.ming-name').value,
      qty: parseFloat(row.querySelector('.ming-qty').value)||0,
      unit: row.querySelector('.ming-unit').value
    }));
  }

  function refreshKcalEstimate(){
    syncRowsFromDom();
    const servings = Math.max(1, parseFloat(root.querySelector('#rf-servings').value)||1);
    const {kcal, matched, total} = estimateIngredientsKcal(rec.ingredients);
    const box = root.querySelector('#rf-kcal-box');
    if(!total){
      box.innerHTML = `Додай інгредієнти, щоб побачити приблизний розрахунок калорій.`;
      return;
    }
    const perServing = Math.round(kcal/servings);
    box.innerHTML = `Автоматично: <strong>≈ ${perServing} ккал/порція</strong> · розпізнано ${matched} з ${total} інгредієнтів
      <button type="button" class="btn gold small" id="rf-use-auto">Використати</button>`;
    const useBtn = box.querySelector('#rf-use-auto');
    if(useBtn) useBtn.onclick = ()=>{
      root.querySelector('#rf-calories').value = perServing;
      showToast('Калорійність застосовано');
    };
  }

  root.querySelector('#modal-close').onclick = closeModal;
  root.querySelector('#rf-cancel').onclick = closeModal;
  root.querySelector('#modal-overlay').addEventListener('click', e=>{ if(e.target.id==='modal-overlay') closeModal(); });

  root.querySelector('#rf-add-ing').onclick = ()=>{
    syncRowsFromDom();
    rec.ingredients.push({name:'',qty:1,unit:'г'});
    document.getElementById('rf-ings').innerHTML = ingredientsRowsHtml();
    bindIngRowEvents();
    refreshKcalEstimate();
  };
  function bindIngRowEvents(){
    document.querySelectorAll('[data-act="ming-del"]').forEach(btn=>{
      btn.onclick = ()=>{
        syncRowsFromDom();
        const idx = parseInt(btn.dataset.idx);
        rec.ingredients.splice(idx,1);
        if(!rec.ingredients.length) rec.ingredients.push({name:'',qty:1,unit:'г'});
        document.getElementById('rf-ings').innerHTML = ingredientsRowsHtml();
        bindIngRowEvents();
        refreshKcalEstimate();
      };
    });
    root.querySelectorAll('.ing-form-row input, .ing-form-row select').forEach(el=>{
      el.addEventListener('input', refreshKcalEstimate);
      el.addEventListener('change', refreshKcalEstimate);
    });
  }
  bindIngRowEvents();
  root.querySelector('#rf-servings').addEventListener('input', refreshKcalEstimate);
  refreshKcalEstimate();

  root.querySelector('#rf-save').onclick = async ()=>{
    syncRowsFromDom();
    const name = root.querySelector('#rf-name').value.trim();
    if(!name){ showToast('Вкажи назву страви'); return; }
    rec.name = name;
    rec.time = root.querySelector('#rf-time').value;
    rec.servings = root.querySelector('#rf-servings').value;
    rec.calories = root.querySelector('#rf-calories').value;
    rec.instructions = root.querySelector('#rf-instructions').value;
    rec.ingredients = rec.ingredients.filter(i=>i.name.trim());
    if(isEdit){
      const idx = state.recipes.findIndex(r=>r.id===rec.id);
      state.recipes[idx] = rec;
    }else{
      state.recipes.push(rec);
    }
    await saveRecipes();
    closeModal();
    renderMain();
    showToast('Рецепт збережено');
  };
}

/* ---------------- EVENT BINDING PER TAB ---------------- */
function bindTabEvents(){
  const main = document.getElementById('main');

  // FRIDGE
  const frAdd = main.querySelector('[data-act="fridge-add"]');
  if(frAdd){
    frAdd.onclick = async ()=>{
      const name = main.querySelector('#fr-name').value.trim();
      const qty = parseFloat(main.querySelector('#fr-qty').value)||0;
      const unit = main.querySelector('#fr-unit').value;
      const category = main.querySelector('#fr-cat').value;
      if(!name){ showToast('Вкажи назву продукту'); return; }
      const existing = state.fridge.find(f=>norm(f.name)===norm(name) && f.unit===unit);
      if(existing){ existing.qty = Math.round((existing.qty+qty)*100)/100; }
      else state.fridge.push({id:uid(), name, qty, unit, category});
      await saveFridge();
      renderMain();
    };
  }
  main.querySelectorAll('[data-act="fridge-inc"]').forEach(b=>b.onclick=async()=>{
    const item = state.fridge.find(f=>f.id===b.dataset.id);
    item.qty = Math.round((item.qty+1)*100)/100;
    await saveFridge(); renderMain();
  });
  main.querySelectorAll('[data-act="fridge-dec"]').forEach(b=>b.onclick=async()=>{
    const item = state.fridge.find(f=>f.id===b.dataset.id);
    item.qty = Math.max(0, Math.round((item.qty-1)*100)/100);
    await saveFridge(); renderMain();
  });
  main.querySelectorAll('[data-act="fridge-del"]').forEach(b=>b.onclick=async()=>{
    state.fridge = state.fridge.filter(f=>f.id!==b.dataset.id);
    await saveFridge(); renderMain();
  });

  // SHOPPING
  const shAdd = main.querySelector('[data-act="shop-add"]');
  if(shAdd){
    shAdd.onclick = async ()=>{
      const name = main.querySelector('#sh-name').value.trim();
      const qty = parseFloat(main.querySelector('#sh-qty').value)||0;
      const unit = main.querySelector('#sh-unit').value;
      if(!name){ showToast('Вкажи назву продукту'); return; }
      state.shopping.push({id:uid(), name, qty, unit, checked:false, auto:false});
      await saveShopping();
      renderMain();
    };
  }
  main.querySelectorAll('[data-act="shop-toggle"]').forEach(cb=>cb.onchange=async()=>{
    const item = state.shopping.find(s=>s.id===cb.dataset.id);
    item.checked = cb.checked;
    await saveShopping(); renderMain();
  });
  main.querySelectorAll('[data-act="shop-del"]').forEach(b=>b.onclick=async()=>{
    state.shopping = state.shopping.filter(s=>s.id!==b.dataset.id);
    await saveShopping(); renderMain();
  });
  const transferBtn = main.querySelector('[data-act="shop-transfer"]');
  if(transferBtn){
    transferBtn.onclick = async ()=>{
      const bought = state.shopping.filter(s=>s.checked);
      bought.forEach(b=>{
        const existing = state.fridge.find(f=>norm(f.name)===norm(b.name) && f.unit===b.unit);
        if(existing){ existing.qty = Math.round((existing.qty+b.qty)*100)/100; }
        else state.fridge.push({id:uid(), name:b.name, qty:b.qty, unit:b.unit, category:'Інше'});
      });
      state.shopping = state.shopping.filter(s=>!s.checked);
      await Promise.all([saveFridge(), saveShopping()]);
      renderMain();
      showToast('Перенесено в холодильник');
    };
  }

  // DISHES
  main.querySelectorAll('[data-act="dish-plan"]').forEach(b=>b.onclick=()=>{
    const r = state.recipes.find(r=>r.id===b.dataset.id);
    openPlanPicker(r);
  });
  main.querySelectorAll('[data-act="dish-buy-missing"]').forEach(b=>b.onclick=async()=>{
    const r = state.recipes.find(r=>r.id===b.dataset.id);
    addMissingToShopping(missingIngredients(r));
    await saveShopping();
    showToast('Додано в список покупок');
    renderMain();
  });

  // PLAN
  main.querySelectorAll('[data-act="plan-select"]').forEach(sel=>sel.onchange=async()=>{
    const dIdx = parseInt(sel.dataset.day);
    const mealKey = sel.dataset.meal;
    const val = sel.value || null;
    state.mealplan[dIdx][mealKey] = val;
    if(val){
      const r = state.recipes.find(r=>r.id===val);
      const missing = missingIngredients(r);
      addMissingToShopping(missing);
      await Promise.all([saveMealplan(), saveShopping()]);
      showToast('Заплановано' + (missing.length? ', бракуюче — в покупках':''));
    }else{
      await saveMealplan();
    }
    renderMain();
  });
  const goalBtn = main.querySelector('[data-act="open-goal"]');
  if(goalBtn) goalBtn.onclick = openGoalEditor;

  // RECIPES
  const newRecipeBtn = main.querySelector('[data-act="recipe-new"]');
  if(newRecipeBtn) newRecipeBtn.onclick = ()=>openRecipeForm(null);
  main.querySelectorAll('[data-act="recipe-view"]').forEach(b=>b.onclick=()=>{
    openRecipeView(state.recipes.find(r=>r.id===b.dataset.id));
  });
  main.querySelectorAll('[data-act="recipe-edit"]').forEach(b=>b.onclick=()=>{
    openRecipeForm(state.recipes.find(r=>r.id===b.dataset.id));
  });
  main.querySelectorAll('[data-act="recipe-del"]').forEach(b=>b.onclick=async()=>{
    state.recipes = state.recipes.filter(r=>r.id!==b.dataset.id);
    state.mealplan.forEach(day=>{
      MEALS.forEach(m=>{ if(day[m.key]===b.dataset.id) day[m.key]=null; });
    });
    await Promise.all([saveRecipes(), saveMealplan()]);
    renderMain();
    showToast('Рецепт видалено');
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str==null? '' : String(str);
  return d.innerHTML;
}

document.addEventListener('DOMContentLoaded', ()=>{
  const gaugeBtn = document.getElementById('gauge-btn');
  if(gaugeBtn) gaugeBtn.addEventListener('click', openGoalEditor);
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
